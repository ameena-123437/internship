<!DOCTYPE html>
<html>
<head>
    <title>To Do List</title>
    <style>
        body {
            font-family: Arial;
            background-color: #7d92a8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
        }

        h2 {
            color: #b4b459;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        .addBtn {
            padding: 8px;
            background: #bc6ba3;
            color: white;
            border: none;
            cursor: pointer;
        }

        li {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editBtn {
            background: green;
            color: white;
            border: none;
            margin-left: 5px;
            cursor: pointer;
        }

        .deleteBtn {
            background: red;
            color: white;
            border: none;
            margin-left: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>To Do List</h2>

    <input type="text" id="taskInput" placeholder="Add Todo">
    <button class="addBtn" onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        let input = document.getElementById("taskInput");
        let taskText = input.value.trim();

        if (taskText === "") return;

        let li = document.createElement("li");

        let span = document.createElement("span");
        span.textContent = taskText;

    
        let editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.className = "editBtn";

        editBtn.onclick = function() {
            let newTask = prompt("Edit your task:", span.textContent);
            if (newTask !== null && newTask.trim() !== "") {
                span.textContent = newTask;
            }
        };

        
        let deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.className = "deleteBtn";

        deleteBtn.onclick = function() {
            li.remove();
        };

        li.appendChild(span);
        li.appendChild(editBtn);
        li.appendChild(deleteBtn);

        document.getElementById("taskList").appendChild(li);

        input.value = "";
    }
</script>

</body>
</html>
