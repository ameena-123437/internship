<!DOCTYPE html>
<html>
<head>
    <title>DOM Example</title>
</head>
<body>

<h1 id="title">Hello World</h1>

<button onclick="changeText()">Change Text</button>

<script>
function changeText() {
    document.getElementById("title").textContent = "Welcome to JavaScript!";
}
</script>

</body>
</html>
