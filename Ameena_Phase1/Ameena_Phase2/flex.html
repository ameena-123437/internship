<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Direction</title>
</head>
<body>

    <h3>Flex Direction: Row</h3>
    <div class="flex-row">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h3>Flex Direction: Column</h3>
    <div class="flex-column">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

</body>

<style>

.flex-row {
  display: flex;
  flex-direction: row; 
  justify-content: space-between;
  align-items: center;
  height: 150px;
  background: lightgray;
  margin-bottom: 20px;
}

.flex-column {
  display: flex;
  flex-direction: column; 
  justify-content: space-between;
  align-items: center;
  height: 200px;
  background: rgb(99, 134, 150);
}

.item {
  background: rgb(212, 128, 183);
  color: rgb(18, 15, 15);
  padding: 20px;
  margin: 5px;
}

</style>
</html>
