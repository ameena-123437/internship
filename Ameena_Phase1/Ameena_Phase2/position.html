<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position</title>
  <style>
    body {
    
      font-family: Arial, sans-serif;
    }
.navbar {
      position: fixed;
      width: 100%;
      top:0%;
      background-color: pink;
      color: white;
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }
 
    .content {
      margin-top: 50px;
      padding: 20px;
    }

    .image-box {
      position: relative;
      width: 600px;
    }
.image-box img {
      width: 100%;
      display: block;
    }
  .badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background-color: rgb(42, 28, 242);
      color: rgb(204, 238, 14);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="navbar"> 
<nav>
    <a href="./about ai.html">About </a>
</nav></div>
  <div class="content">
    <h2>Artificial intelligence and Badge</h2>

    <div class="image-box">
      <img src="./artificial-intelligence-ai-business-people-showing-future-technology-photo.jpg" alt="Sample Image">
      <div class="badge">Artificial intelligence</div>
    </div>

    <p>AI is used in many areas such as helathcare,education,transportation,and daily applications.

  </div>

</body>
</html>
