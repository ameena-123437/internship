<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Design</title>
  <style>
    body {
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 300px;
      margin: 50px auto;
      border: 2px solid #ddd;
      border-radius: 10px;
      overflow: hidden; 
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px; 
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      margin-bottom: 15px;
      color: #555;
    }

    .card button {
      padding: 10px 15px;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="./AI 600 x 400.jpg"Artificial intelligence Image">

    <div class="card-content">
      <h2>Artificial Intelligence</h2>
      <p>AI is the ability of machines to perform tasks that normally require human intelligence.</p>
      <button>Read More</button>
    </div>
  </div>

</body>
</html>
